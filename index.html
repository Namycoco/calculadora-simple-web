<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora básica</title>

<style>
body {
    font-family: "Georgia", serif;
    background: linear-gradient(135deg, #ffe6ff, #ffe6ff);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.calculadora {
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
    text-align: center;
}

input {
    width: 80%;
    padding: 10px;
    margin: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    font-family: "Georgia", serif;
    padding: 10px 15px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #ffe6ff;
    font-weight: bold;
    color: black; /* corregido */
}

button:hover {
    background: #ffd6ff;
}

#resultado {
    margin-top: 15px;
    font-size: 18px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="calculadora">
    <h2>Calculadora básica</h2>

    <input type="number" id="num1" placeholder="Primer número">
    <input type="number" id="num2" placeholder="Segundo número">

    <br>

    <button onclick="calcular(1)">Sumar</button>
    <button onclick="calcular(2)">Restar</button>
    <button onclick="calcular(3)">Multiplicar</button>
    <button onclick="calcular(4)">Dividir</button>
    <button onclick="limpiar()">Limpiar</button>

    <div id="resultado"></div>
</div>

<script>
function calcular(opcion) {
    let n1 = parseFloat(document.getElementById("num1").value);
    let n2 = parseFloat(document.getElementById("num2").value);
    let resultado = "";

    if (isNaN(n1) || isNaN(n2)) {
        resultado = "Introduce números válidos";
    } else {
        if (opcion === 1) resultado = n1 + n2;
        else if (opcion === 2) resultado = n1 - n2;
        else if (opcion === 3) resultado = n1 * n2;
        else if (opcion === 4) {
            if (n2 === 0) resultado = "No se puede dividir entre 0";
            else resultado = n1 / n2;


        }

        // Limitar decimales a 2 si el resultado es decimal
        if (typeof resultado === "number" && !Number.isInteger(resultado)) {
            resultado = resultado.toFixed(2);
        }

        // Mostrar con la palabra "Resultado: "
        resultado = "Resultado: " + resultado;
    }

    document.getElementById("resultado").innerText = resultado;
}
// Función para limpiar inputs y resultado
function limpiar() {
    document.getElementById("num1").value = "";
    document.getElementById("num2").value = "";
    document.getElementById("resultado").innerText = "";
}
</script>

</body>
</html>
